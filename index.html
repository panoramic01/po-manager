<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PO Manager</title>

  <link rel="manifest" href="manifest.json">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PO Manager">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1F3971">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #1F3971;
      overflow: hidden;
    }

    #loader {
      position: fixed; inset: 0;
      background: #1F3971;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; z-index: 10;
      transition: opacity 0.4s;
      padding: 32px;
      text-align: center;
    }
    #loader svg { width: 64px; height: 64px; flex-shrink: 0; }

    #loading-label {
      color: rgba(255,255,255,0.55);
      font-family: -apple-system, sans-serif;
      font-size: 15px;
    }

    #joke-box {
      max-width: 300px;
      margin-top: 4px;
    }
    #joke-setup {
      color: rgba(255,255,255,0.9);
      font-family: -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.45;
    }

    /* Error state */
    #error {
      display: none;
      position: fixed; inset: 0;
      background: #1F3971;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 10;
      padding: 32px; text-align: center;
    }
    #error p { color: rgba(255,255,255,0.8); font-family: -apple-system, sans-serif; font-size: 15px; line-height: 1.5; }
    #error button {
      background: white; color: #1F3971;
      border: none; border-radius: 12px;
      padding: 12px 28px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 4px;
    }

    iframe {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div id="loader">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="64" height="64" rx="16" fill="white" fill-opacity="0.15"/>
      <path d="M16 24l16-8 16 8v16l-16 8-16-8V24z" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M16 24l16 8 16-8M32 32v16" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
    </svg>

    <div id="joke-box">
      <div id="joke-setup">Loading PO Manager…</div>
    </div>

    <div id="loading-label">Loading PO Manager…</div>
  </div>

  <div id="error">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:56px;height:56px">
      <rect width="64" height="64" rx="16" fill="white" fill-opacity="0.15"/>
      <path d="M16 24l16-8 16 8v16l-16 8-16-8V24z" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M16 24l16 8 16-8M32 32v16" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
    </svg>
    <p>Couldn't load PO Manager.<br>Tap below to open it.</p>
    <button onclick="openDirect()">Open App</button>
  </div>

  <iframe
    id="app"
    src="https://script.google.com/a/macros/panoramicbuildingllc.com/s/AKfycbzIFAUROq_34cldhXfRL-lGijntH2Y3hqykYZ5Br0zub70BZAA5MHzpe61ZL-JEDhDJeg/exec"
    allow="camera; microphone; clipboard-write; storage-access"
    onload="onIframeLoad()"
    onerror="onIframeError()">
  </iframe>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    var GAS_URL = 'https://script.google.com/a/macros/panoramicbuildingllc.com/s/AKfycbzIFAUROq_34cldhXfRL-lGijntH2Y3hqykYZ5Br0zub70BZAA5MHzpe61ZL-JEDhDJeg/exec';

    var JOKES = [
      "I told my wife she was drawing her eyebrows too high. She looked surprised.",
      "I used to be a banker, but I lost interest.",
      "Why don't skeletons fight each other? They don't have the guts.",
      "I'm on a seafood diet. I see food and I eat it.",
      "What do you call a fish without eyes? A fsh.",
      "I asked the librarian if they had books about paranoia. She whispered, 'They're right behind you.'",
      "Why did the math book look so sad? Because it had too many problems.",
      "I told my doctor I broke my arm in two places. He told me to stop going to those places.",
      "What do you call a bear with no teeth? A gummy bear.",
      "I used to hate facial hair, but then it grew on me.",
      "Why can't you give Elsa a balloon? Because she'll let it go.",
      "I'm reading a book about anti-gravity. It's impossible to put down.",
      "Did you hear about the guy who invented Lifesavers? He made a mint.",
      "Why did the bicycle fall over? It was two-tired.",
      "I would tell a construction joke, but I'm still working on it.",
      "What do you call cheese that isn't yours? Nacho cheese.",
      "Why don't scientists trust atoms? Because they make up everything.",
      "I couldn't figure out why the baseball kept getting bigger. Then it hit me.",
      "What do you call a sleeping dinosaur? A dino-snore.",
      "Why did the scarecrow win an award? Because he was outstanding in his field.",
      "I have a joke about paper, but it's tearable.",
      "What do you call a factory that makes okay products? A satisfactory.",
      "Why do cows wear bells? Because their horns don't work.",
      "I tried to catch some fog earlier. I mist.",
      "Want to hear a joke about construction? I'm still working on it.",
      "Why don't eggs tell jokes? They'd crack each other up.",
      "What do you call a man with a rubber toe? Roberto.",
      "I only know 25 letters of the alphabet. I don't know y.",
      "Did you hear about the claustrophobic astronaut? He just needed a little space.",
      "Why did the coffee file a police report? It got mugged.",
      "I'm afraid for the calendar. Its days are numbered.",
      "What do you call an alligator in a vest? An investigator.",
      "Why did the golfer bring extra pants? In case he got a hole in one.",
      "I used to play piano by ear, but now I use my hands.",
      "What's a skeleton's least favorite room? The living room.",
      "Why can't a nose be 12 inches long? Because then it would be a foot.",
      "What do you call a pile of cats? A meow-ntain.",
      "I told my boss I needed a raise because three companies were after me. He asked which ones. I said the gas, electric, and water companies.",
      "What do lawyers wear to court? Lawsuits.",
      "I asked my dog what two minus two is. He said nothing.",
      "Why do bees hum? Because they don't know the words.",
      "What do you call a parade of rabbits hopping backwards? A receding hare-line.",
      "I got fired from the calendar factory. All I did was take a day off.",
      "What's brown and sticky? A stick.",
      "Why did the tomato turn red? Because it saw the salad dressing.",
      "I used to be addicted to soap, but I'm clean now.",
      "What do you call a boomerang that won't come back? A stick.",
      "Why did the invisible man turn down the job offer? He couldn't see himself doing it.",
      "I have a joke about a roof. It's on the house.",
      "What do you call someone with no body and no nose? Nobody knows."
    ];

    var joke = JOKES[Math.floor(Math.random() * JOKES.length)];
    document.getElementById('joke-setup').textContent = joke;

    var appReady   = false;
    var timerReady = false;
    var hidden     = false;

    // Minimum joke display time
    setTimeout(function() {
      timerReady = true;
      if (appReady) hideLoader();
    }, 4000);

    // Best case: GAS app signals that PO data is fully loaded
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'po-manager-ready') {
        markReady();
      }
    });

    // Fallback: iframe finished loading (data may still be fetching, but better than error screen)
    function onIframeLoad() {
      // Give the GAS app 3 seconds to send the postMessage before falling back
      setTimeout(function() { markReady(); }, 3000);
    }

    function onIframeError() {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('error').style.display = 'flex';
    }

    // Hard timeout — something went very wrong
    setTimeout(function() {
      if (!hidden) onIframeError();
    }, 20000);

    function markReady() {
      appReady = true;
      if (timerReady) hideLoader();
    }

    function hideLoader() {
      if (hidden) return;
      hidden = true;
      var loader = document.getElementById('loader');
      loader.style.opacity = '0';
      setTimeout(function() { loader.style.display = 'none'; }, 400);
    }

    function onIframeError() {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('error').style.display = 'flex';
    }

    // Fallback: if iframe hasn't loaded after 15s, show error with direct link
    setTimeout(function() {
      var loader = document.getElementById('loader');
      if (loader.style.display !== 'none') {
        onIframeError();
      }
    }, 15000);

    function openDirect() {
      window.location.href = GAS_URL;
    }
  </script>

</body>
</html>
