<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PO Manager</title>

  <!-- Web App Manifest (enables standalone mode on Android) -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS PWA — hides Safari URL bar when added to home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PO Manager">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

  <!-- Android / Chrome -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1F3971">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #1F3971;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 32px;
      text-align: center;
    }

    #screen svg { width: 72px; height: 72px; }

    #title {
      color: white;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    #subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 15px;
      line-height: 1.5;
      max-width: 280px;
    }

    .btn {
      display: inline-block;
      background: white;
      color: #1F3971;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 14px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      margin-top: 4px;
    }

    .btn-ghost {
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    #install-hint {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      margin-top: 8px;
    }

    /* Loading state */
    #loading { display: none; color: rgba(255,255,255,0.6); font-size: 15px; }
  </style>
</head>
<body>

  <div id="screen">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="64" height="64" rx="16" fill="white" fill-opacity="0.15"/>
      <path d="M16 24l16-8 16 8v16l-16 8-16-8V24z" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M16 24l16 8 16-8M32 32v16" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
    </svg>

    <div id="title">PO Manager</div>
    <div id="subtitle">Panoramic Building purchase order management</div>

    <!-- Shown in browser mode -->
    <div id="install-ui">
      <button class="btn" onclick="openApp()">Open App</button>
      <div id="install-hint">To install: tap ⋮ → Add to Home Screen</div>
    </div>

    <!-- Shown while redirecting (standalone mode) -->
    <div id="loading">Loading…</div>
  </div>

  <script>
    // Register service worker for PWA installability
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    var GAS_URL = 'https://script.google.com/a/macros/panoramicbuildingllc.com/s/AKfycbzIFAUROq_34cldhXfRL-lGijntH2Y3hqykYZ5Br0zub70BZAA5MHzpe61ZL-JEDhDJeg/exec';

    var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

    if (isStandalone) {
      // Opened from home screen — redirect straight to app, no URL bar
      document.getElementById('install-ui').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      window.location.replace(GAS_URL);
    }

    function openApp() {
      window.location.href = GAS_URL;
    }
  </script>

</body>
</html>
